# .github/workflows/release-high-priv.yml
# Workflow B: cache を consume する高権限 workflow
name: High Privilege Release
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # 毎日 UTC 2:00

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # cache を消費（actions/setup-node の cache 機能を使用）
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Build & Publish
        env:
          # テスト用のダミー secret
          DUMMY_SECRET: ${{ secrets.DUMMY_PUBLISH_TOKEN }}
        run: |
          echo "Building..."
          npm run test || true
          echo "Would publish with token: ${DUMMY_SECRET:0:10}..."
